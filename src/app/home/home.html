<!-- NAVBAR -->
<header class="navbar">
  <h2 class="logo">Cyber Space Solutions</h2>

  <nav>
    <a href="#">Home</a>
    <a href="#services">Servicios</a>
    <a href="#contact">Contacto</a>
  </nav>
</header>


<!-- HERO MODERNO -->
<section class="hero">

  <h1>
    Soluciones Tecnológicas<br>
    <span>Integrales</span>
  </h1>

  <p class="subtitle">
    Transformamos tu infraestructura tecnológica con servicios
    profesionales de redes, soporte y seguridad.
  </p>

  <div class="buttons">
    <button class="btn-primary">Ver Servicios</button>
    <button class="btn-outline">Contactar</button>
  </div>

  <!-- CAROUSEL GRANDE -->
  <div class="carousel">

    <button class="arrow" (click)="prev()">❮</button>

    <img [src]="images[current]" />

    <button class="arrow" (click)="next()">❯</button>

  </div>

  <!-- INDICADORES -->
  <div class="dots">
    <span
      *ngFor="let img of images; let i = index"
      [class.active]="i === current"
      (click)="current = i">
    </span>
  </div>

</section>
