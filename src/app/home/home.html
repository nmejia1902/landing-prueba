<header class="navbar">
  <div class="brand">
    <img src="IMG_4579.jpg" alt="Logo" class="logo-img">

  </div>

  <nav>
    <a href="#">Home</a>
    <a href="#services">Servicios</a>

<section class="hero">

  <div class="hero-text">
    <h1>
      Soluciones Tecnológicas<br>
